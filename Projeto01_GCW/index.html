<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipos de Salmão</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: white;
    scroll-behavior: smooth; /* rolagem suave */
}

/* Barra superior */
.topo {
    background-color: #FF8730;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    position: fixed;
    width: 100%;
    top: 0;
}

/* Itens do menu */
.topo a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.topo a:hover {
    text-decoration: underline;
}

/* Conteúdo */
.conteudo {
    margin-top: 100px;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<div class="topo">
    <a onclick="mostrarConteudo('inicio')">inicio</a>
    <a onclick="mostrarConteudo('sashimi')">Sashimi</a>
    <a onclick="mostrarConteudo('grelhado')">Salmão Grelhado</a>
    <a onclick="mostrarConteudo('hotroll')">Hot Roll de Salmão</a>
</div>

<div class="conteudo" id="conteudo">
    <h1>Bem-vindo</h1>
    <p>Escolha um tipo de salmão no menu acima.</p>
</div>

<script>
function mostrarConteudo(tipo) {
    var conteudo = document.getElementById("conteudo");

    if (tipo === "inicio") {
        conteudo.innerHTML = `
            <h1>inicio</h1>
            <img src="imagens/Salmão.jpg" alt="">
            <p>O sashimi é o salmão cru cortado em fatias finas.
            Possui textura macia e sabor suave.
            Normalmente é servido com shoyu, wasabi e gengibre.</p>
        `;
    }

    if (tipo === "sashimi") {
        conteudo.innerHTML = `
            <h1>Sashimi de Salmão</h1>
            <p>O sashimi é o salmão cru cortado em fatias finas.
            Possui textura macia e sabor suave.
            Normalmente é servido com shoyu, wasabi e gengibre.</p>
        `;
    }

    if (tipo === "grelhado") {
        conteudo.innerHTML = `
            <h1>Salmão Grelhado</h1>
            <p>Preparado na grelha ou chapa, o salmão grelhado
            fica levemente crocante por fora e suculento por dentro.
            Pode ser acompanhado de arroz e legumes.</p>
        `;
    }

    if (tipo === "hotroll") {
        conteudo.innerHTML = `
            <h1>Hot Roll de Salmão</h1>
            <p>O hot roll é um sushi empanado e frito.
            O salmão é envolvido com arroz e alga,
            criando uma combinação crocante por fora e macia por dentro.</p>
        `;
    }

    // Volta para o topo
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}
</script>
    
</body>
</html>
